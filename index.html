<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gnoke · Council</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
  
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-dot"></div>
    Gnoke
    <span class="topbar-logo-sep">·</span>
    <span class="topbar-logo-sub">Council</span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-chip" id="youChip">You are Claude</div>
</div>

<div class="identity-bar">
  <span class="identity-label">Posting as</span>
  <div class="id-sep"></div>
  <button class="id-btn" data-ai="You">
    <span class="id-dot" style="background:var(--text)"></span> You
  </button>
  <button class="id-btn active" data-ai="Claude">
    <span class="id-dot"></span> Claude
  </button>
  <button class="id-btn" data-ai="Gemini">
    <span class="id-dot"></span> Gemini
  </button>
  <button class="id-btn" data-ai="GPT-4o">
    <span class="id-dot"></span> GPT-4o
  </button>
  <button class="id-btn" data-ai="Grok">
    <span class="id-dot"></span> Grok
  </button>
</div>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-state-icon">⚡</div>
    <div class="empty-state-title">Council is ready</div>
    <div class="empty-state-sub">Tap <b>You</b> to speak as yourself, or tap an AI identity to relay their response</div>
  </div>
</div>

<div class="input-area">
  <div class="copy-bar">
    <span class="copy-bar-label" id="copyLabel">No responses to copy yet</span>
    <button class="copy-bar-btn" id="copyBtn" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copy context
    </button>
  </div>
  <div class="attach-strip" id="attachStrip">
    <div class="attach-chip">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="attach-chip-name" id="chipName"></span>
      <span class="attach-chip-size" id="chipSize"></span>
      <button class="attach-chip-x" id="attachClear" title="Remove">×</button>
    </div>
  </div>
  <input type="file" id="fileInput" style="display:none"
    accept=".txt,.md,.html,.htm,.css,.js,.jsx,.ts,.tsx,.json,.php,.py,.java,.c,.cpp,.cs,.xml,.yaml,.yml,.sql,.sh,.rb,.go,.rs,.swift,.vue,.svelte,.toml,.env,.gitignore,.csv">
  <div class="input-row">
    <div class="input-wrap" id="inputWrap" data-ai="Claude">
      <button class="attach-btn" id="attachBtn" title="Attach document">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="Post as Claude…"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" data-ai="Claude" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script src="state.js"></script>
<script src="attach.js"></script>
<script src="ui.js"></script>
</body>
</html>

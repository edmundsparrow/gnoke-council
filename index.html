<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gnoke · Council</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --claude:   #E37400;
    --gemini:   #1A73E8;
    --gpt:      #0D9050;
    --grok:     #8430CE;
    --bg:       #FFFFFF;
    --surface:  #F8F9FA;
    --surface2: #F1F3F4;
    --border:   #E8EAED;
    --border2:  #DADCE0;
    --text:     #202124;
    --muted:    #5F6368;
    --muted2:   #80868B;
    --radius:   8px;
    --radius-lg: 16px;
    --font: 'Google Sans Text', 'Google Sans', sans-serif;
    --font-ui: 'Google Sans', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    height: 56px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 10;
  }
  .topbar-logo {
    font-family: var(--font-ui);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .topbar-logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--claude);
  }
  .topbar-logo-sep {
    color: var(--border2);
    font-weight: 300;
    font-size: 20px;
    line-height: 1;
    margin: 0 1px;
  }
  .topbar-logo-sub {
    font-weight: 400;
    color: var(--muted);
    font-size: 17px;
  }
  .topbar-spacer { flex: 1; }
  .topbar-chip {
    font-size: 12px;
    font-family: var(--font-ui);
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 4px 12px;
    font-weight: 500;
  }

  .identity-bar {
    padding: 0 16px;
    height: 48px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .identity-bar::-webkit-scrollbar { display: none; }
  .identity-label {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-ui);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .id-sep {
    width: 1px; height: 18px;
    background: var(--border2);
    flex-shrink: 0;
  }
  .id-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border2);
    background: var(--bg);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.15s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .id-btn:hover { background: var(--surface); }
  .id-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }
  .id-btn[data-ai="Claude"]  .id-dot { background: var(--claude); }
  .id-btn[data-ai="Gemini"]  .id-dot { background: var(--gemini); }
  .id-btn[data-ai="GPT-4o"]  .id-dot { background: var(--gpt); }
  .id-btn[data-ai="Grok"]    .id-dot { background: var(--grok); }

  .id-btn[data-ai="You"].active     { border-color: var(--text);   color: var(--text);   background: var(--surface2); }
  .id-btn[data-ai="Claude"].active  { border-color: var(--claude); color: var(--claude); background: #FFF3E0; }
  .id-btn[data-ai="Gemini"].active  { border-color: var(--gemini); color: var(--gemini); background: #E8F0FE; }
  .id-btn[data-ai="GPT-4o"].active  { border-color: var(--gpt);    color: var(--gpt);    background: #E6F4EA; }
  .id-btn[data-ai="Grok"].active    { border-color: var(--grok);   color: var(--grok);   background: #F3E8FD; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .day-divider {
    text-align: center;
    font-size: 11px;
    color: var(--muted2);
    font-family: var(--font-ui);
    margin: 8px 0 16px;
    position: relative;
  }
  .day-divider::before {
    content: '';
    position: absolute; top: 50%; left: 10%; right: 10%;
    height: 1px; background: var(--border);
  }
  .day-divider span {
    background: var(--bg);
    padding: 0 12px;
    position: relative;
  }

  .msg-group {
    padding: 2px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: fadeUp 0.18s ease both;
  }
  .msg-group.from-me { flex-direction: row-reverse; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 600;
    color: white;
    flex-shrink: 0;
    margin-bottom: 2px;
  }
  .msg-avatar[data-ai="You"]     { background: var(--text); }
  .msg-avatar[data-ai="Claude"]  { background: var(--claude); }
  .msg-avatar[data-ai="Gemini"]  { background: var(--gemini); }
  .msg-avatar[data-ai="GPT-4o"]  { background: var(--gpt); }
  .msg-avatar[data-ai="Grok"]    { background: var(--grok); }

  .msg-col { display: flex; flex-direction: column; gap: 2px; max-width: 72%; }
  .msg-group.from-me .msg-col { align-items: flex-end; }

  .msg-sender {
    font-size: 11px;
    font-family: var(--font-ui);
    font-weight: 500;
    padding: 0 4px;
    margin-bottom: 1px;
  }
  .msg-sender[data-ai="Claude"]  { color: var(--claude); }
  .msg-sender[data-ai="Gemini"]  { color: var(--gemini); }
  .msg-sender[data-ai="GPT-4o"]  { color: var(--gpt); }
  .msg-sender[data-ai="Grok"]    { color: var(--grok); }

  .bubble {
    padding: 9px 14px;
    border-radius: var(--radius-lg);
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
    position: relative;
  }
  .bubble.from-other {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .bubble.from-me {
    color: white;
    border-bottom-right-radius: 4px;
  }
  .bubble.from-me[data-ai="You"]    { background: var(--text); }
  .bubble.from-me[data-ai="Claude"]  { background: var(--claude); }
  .bubble.from-me[data-ai="Gemini"]  { background: var(--gemini); }
  .bubble.from-me[data-ai="GPT-4o"]  { background: var(--gpt); }
  .bubble.from-me[data-ai="Grok"]    { background: var(--grok); }

  .bubble-time {
    font-size: 10px;
    color: var(--muted2);
    padding: 0 4px;
    font-family: var(--font-ui);
  }
  .msg-group.from-me .bubble-time { text-align: right; }

  .input-area {
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .copy-bar {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 12px;
  }
  .copy-bar-label {
    font-size: 11.5px;
    color: var(--muted);
    font-family: var(--font-ui);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .copy-bar-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--bg);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .copy-bar-btn:hover { background: var(--surface2); border-color: var(--muted2); color: var(--text); }
  .copy-bar-btn.done { color: #0D9050; border-color: #0D9050; background: #E6F4EA; }
  .copy-bar-btn:disabled { opacity: 0.45; pointer-events: none; }

  .input-row {
    padding: 10px 16px 12px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    display: flex;
    align-items: flex-end;
    background: var(--surface);
    border: 1.5px solid var(--border2);
    border-radius: 24px;
    padding: 8px 14px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .input-wrap[data-ai="Claude"]:focus-within  { border-color: var(--claude); }
  .input-wrap[data-ai="Gemini"]:focus-within  { border-color: var(--gemini); }
  .input-wrap[data-ai="GPT-4o"]:focus-within  { border-color: var(--gpt); }
  .input-wrap[data-ai="Grok"]:focus-within    { border-color: var(--grok); }

  .chat-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }
  .chat-input::placeholder { color: var(--muted2); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.1s, opacity 0.15s;
    color: white;
  }
  .send-btn:hover { transform: scale(1.06); }
  .send-btn:active { transform: scale(0.94); }
  .send-btn[data-ai="You"]     { background: var(--text); }
  .send-btn[data-ai="Claude"]  { background: var(--claude); }
  .send-btn[data-ai="Gemini"]  { background: var(--gemini); }
  .send-btn[data-ai="GPT-4o"]  { background: var(--gpt); }
  .send-btn[data-ai="Grok"]    { background: var(--grok); }
  .send-btn svg { width: 16px; height: 16px; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 8px; color: var(--muted2);
    font-family: var(--font-ui);
  }
  .empty-state-icon { font-size: 36px; margin-bottom: 4px; }
  .empty-state-title { font-size: 15px; font-weight: 500; color: var(--muted); }
  .empty-state-sub { font-size: 13px; }

  .attach-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted2); padding: 2px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; transition: color 0.15s;
  }
  .attach-btn:hover { color: var(--text); }
  .attach-btn svg { width: 16px; height: 16px; }

  .attach-strip { padding: 6px 16px 0; display: none; }
  .attach-strip.visible { display: block; }
  .attach-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px 4px 8px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border2);
    font-family: var(--font-ui); font-size: 11.5px; color: var(--muted); max-width: 100%;
  }
  .attach-chip-name {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 200px; color: var(--text); font-weight: 500;
  }
  .attach-chip-size { color: var(--muted2); flex-shrink: 0; }
  .attach-chip-x {
    background: none; border: none; cursor: pointer;
    color: var(--muted2); padding: 0; line-height: 1; font-size: 14px;
    flex-shrink: 0; transition: color 0.1s;
  }
  .attach-chip-x:hover { color: var(--text); }

  .attach-card {
    margin-top: 6px; border-radius: 8px;
    border: 1px solid var(--border2); overflow: hidden;
  }
  .bubble.from-me .attach-card { border-color: rgba(255,255,255,0.25); }
  .attach-card-head {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; background: rgba(0,0,0,0.04);
    border-bottom: 1px solid var(--border2);
  }
  .bubble.from-me .attach-card-head { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
  .attach-card-icon { flex-shrink: 0; opacity: 0.65; }
  .attach-card-icon svg { width: 13px; height: 13px; }
  .attach-card-name { font-family: var(--font-ui); font-size: 11.5px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .attach-card-meta { font-family: var(--font-ui); font-size: 10px; color: var(--muted2); flex-shrink: 0; }
  .bubble.from-me .attach-card-meta { color: rgba(255,255,255,0.6); }
  .attach-card-preview {
    padding: 7px 10px; font-family: var(--font-ui); font-size: 11px;
    color: var(--muted); line-height: 1.5; white-space: pre-wrap;
    word-break: break-all; max-height: 54px; overflow: hidden; background: var(--surface);
  }
  .bubble.from-me .attach-card-preview { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.65); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-dot"></div>
    Gnoke
    <span class="topbar-logo-sep">·</span>
    <span class="topbar-logo-sub">Council</span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-chip" id="youChip">You are Claude</div>
</div>

<div class="identity-bar">
  <span class="identity-label">Posting as</span>
  <div class="id-sep"></div>
  <button class="id-btn" data-ai="You">
    <span class="id-dot" style="background:var(--text)"></span> You
  </button>
  <button class="id-btn active" data-ai="Claude">
    <span class="id-dot"></span> Claude
  </button>
  <button class="id-btn" data-ai="Gemini">
    <span class="id-dot"></span> Gemini
  </button>
  <button class="id-btn" data-ai="GPT-4o">
    <span class="id-dot"></span> GPT-4o
  </button>
  <button class="id-btn" data-ai="Grok">
    <span class="id-dot"></span> Grok
  </button>
</div>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-state-icon">⚡</div>
    <div class="empty-state-title">Council is ready</div>
    <div class="empty-state-sub">Tap <b>You</b> to speak as yourself, or tap an AI identity to relay their response</div>
  </div>
</div>

<div class="input-area">
  <div class="copy-bar">
    <span class="copy-bar-label" id="copyLabel">No responses to copy yet</span>
    <button class="copy-bar-btn" id="copyBtn" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copy context
    </button>
  </div>
  <div class="attach-strip" id="attachStrip">
    <div class="attach-chip">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="attach-chip-name" id="chipName"></span>
      <span class="attach-chip-size" id="chipSize"></span>
      <button class="attach-chip-x" id="attachClear" title="Remove">×</button>
    </div>
  </div>
  <input type="file" id="fileInput" style="display:none"
    accept=".txt,.md,.html,.htm,.css,.js,.jsx,.ts,.tsx,.json,.php,.py,.java,.c,.cpp,.cs,.xml,.yaml,.yml,.sql,.sh,.rb,.go,.rs,.swift,.vue,.svelte,.toml,.env,.gitignore,.csv">
  <div class="input-row">
    <div class="input-wrap" id="inputWrap" data-ai="Claude">
      <button class="attach-btn" id="attachBtn" title="Attach document">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="Post as Claude…"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" data-ai="Claude" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const AIS = ["You","Claude","Gemini","GPT-4o","Grok"];
  const INITIALS = { You:"You", Claude:"Cl", Gemini:"Ge", "GPT-4o":"GP", Grok:"Gr" };
  let activeAI = "Claude";
  let msgCount = 0;
  let pendingFile = null;
  const thread = [];

  function getTime() {
    const d = new Date();
    return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function contextFor(ai) {
    return ai === "You" ? thread : thread.filter(m => m.ai !== ai);
  }

  function updateCopyBar() {
    const label = document.getElementById("copyLabel");
    const btn   = document.getElementById("copyBtn");
    const msgs  = contextFor(activeAI);
    if (!msgs.length) {
      label.textContent = thread.length ? `${activeAI} has nothing to copy` : "No messages yet";
      btn.disabled = true;
    } else {
      const senders = [...new Set(msgs.map(m => m.ai))].join(" + ");
      label.textContent = activeAI === "You"
        ? `Full thread — ${msgs.length} message${msgs.length > 1 ? "s" : ""}`
        : `For ${activeAI}: ${msgs.length} msg${msgs.length > 1 ? "s" : ""} from ${senders}`;
      btn.disabled = false;
    }
  }

  function switchIdentity(ai) {
    activeAI = ai;
    document.querySelectorAll(".id-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.ai === ai)
    );
    document.getElementById("youChip").textContent =
      ai === "You" ? "Posting as yourself" : `You are ${ai}`;
    document.getElementById("chatInput").placeholder =
      ai === "You" ? "Say something…" : `Post as ${ai}…`;
    document.getElementById("inputWrap").dataset.ai = ai;
    document.getElementById("sendBtn").dataset.ai = ai;
    updateCopyBar();
  }

  function fmtBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function fileExt(name) {
    return name.includes('.') ? name.split('.').pop().toLowerCase() : '';
  }

  function renderAttachCard(file) {
    const lines = file.content.split('\n').length;
    const preview = file.content.slice(0, 120).replace(/</g, '&lt;');
    return `<div class="attach-card">
      <div class="attach-card-head">
        <span class="attach-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
        <span class="attach-card-name">${escHtml(file.name)}</span>
        <span class="attach-card-meta">${lines} lines · ${fmtBytes(file.size)}</span>
      </div>
      <div class="attach-card-preview">${preview}${file.content.length > 120 ? '…' : ''}</div>
    </div>`;
  }

  function postMessage(ai, text, file) {
    const e = document.getElementById("emptyState");
    if (e) e.remove();
    msgCount++;
    if (msgCount === 1) {
      const div = document.createElement("div");
      div.className = "day-divider";
      div.innerHTML = `<span>Today</span>`;
      document.getElementById("messages").appendChild(div);
    }
    thread.push({ ai, text, file: file || null });
    const isMe = (ai === "You");
    const msgs = document.getElementById("messages");
    const group = document.createElement("div");
    group.className = `msg-group ${isMe ? "from-me" : ""}`;
    const time = getTime();
    let bubbleContent = text ? escHtml(text) : '';
    if (file) bubbleContent += renderAttachCard(file);
    if (isMe) {
      group.innerHTML = `
        <div class="msg-col">
          <div class="bubble from-me" data-ai="${ai}">${bubbleContent}</div>
          <div class="bubble-time">${time}</div>
        </div>
        <div class="msg-avatar" data-ai="${ai}">You</div>`;
    } else {
      group.innerHTML = `
        <div class="msg-avatar" data-ai="${ai}">${INITIALS[ai]}</div>
        <div class="msg-col">
          <div class="msg-sender" data-ai="${ai}">${ai}</div>
          <div class="bubble from-other">${bubbleContent}</div>
          <div class="bubble-time">${time}</div>
        </div>`;
    }
    msgs.appendChild(group);
    msgs.scrollTop = msgs.scrollHeight;
    updateCopyBar();
  }

  function send() {
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if (!text && !pendingFile) return;
    postMessage(activeAI, text, pendingFile);
    input.value = "";
    input.style.height = "auto";
    clearAttachment();
  }

  function clearAttachment() {
    pendingFile = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('attachStrip').classList.remove('visible');
  }

  function stageFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      pendingFile = { name: file.name, size: file.size, content: e.target.result };
      document.getElementById('chipName').textContent = file.name;
      document.getElementById('chipSize').textContent = fmtBytes(file.size);
      document.getElementById('attachStrip').classList.add('visible');
    };
    reader.readAsText(file);
  }

  document.getElementById("copyBtn").addEventListener("click", () => {
    const msgs = contextFor(activeAI);
    if (!msgs.length) return;
    const compiled = msgs.map(m => {
      let block = `[${m.ai}]`;
      if (m.text) block += `\n${m.text}`;
      if (m.file) block += `\n\n[attachment: ${m.file.name}]\n\`\`\`${fileExt(m.file.name)}\n${m.file.content}\n\`\`\``;
      return block;
    }).join('\n\n---\n\n');
    navigator.clipboard.writeText(compiled).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('done');
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
      setTimeout(() => {
        btn.classList.remove('done');
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy context`;
        updateCopyBar();
      }, 2000);
    });
  });

  document.querySelector(".identity-bar").addEventListener("click", e => {
    const btn = e.target.closest(".id-btn");
    if (btn) switchIdentity(btn.dataset.ai);
  });

  document.getElementById("sendBtn").addEventListener("click", send);

  document.getElementById("chatInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  document.getElementById("chatInput").addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
  });

  document.getElementById('attachBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) stageFile(file);
  });

  document.getElementById('attachClear').addEventListener('click', clearAttachment);

  document.getElementById('inputWrap').addEventListener('dragover', e => {
    e.preventDefault();
    e.currentTarget.style.borderColor = 'var(--claude)';
  });

  document.getElementById('inputWrap').addEventListener('dragleave', e => {
    e.currentTarget.style.borderColor = '';
  });

  document.getElementById('inputWrap').addEventListener('drop', e => {
    e.preventDefault();
    e.currentTarget.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file) stageFile(file);
  });

  switchIdentity("Claude");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gnoke · Council</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"/>
  
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-dot"></div>
    Gnoke
    <span class="topbar-logo-sep">·</span>
    <span class="topbar-logo-sub">Council</span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-chip" id="youChip">You are Claude</div>
</div>

<div class="identity-bar">
  <span class="identity-label">Posting as</span>
  <div class="id-sep"></div>
  <button class="id-btn" data-ai="You">
    <span class="id-dot" style="background:var(--text)"></span> You
  </button>
  <button class="id-btn active" data-ai="Claude">
    <span class="id-dot"></span> Claude
  </button>
  <button class="id-btn" data-ai="Gemini">
    <span class="id-dot"></span> Gemini
  </button>
  <button class="id-btn" data-ai="GPT-4o">
    <span class="id-dot"></span> GPT-4o
  </button>
  <button class="id-btn" data-ai="Grok">
    <span class="id-dot"></span> Grok
  </button>
</div>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-state-icon">⚡</div>
    <div class="empty-state-title">Council is ready</div>
    <div class="empty-state-sub">Tap <b>You</b> to speak as yourself, or tap an AI identity to relay their response</div>
  </div>
</div>

<div class="input-area">
  <div class="copy-bar">
    <span class="copy-bar-label" id="copyLabel">No responses to copy yet</span>
    <button class="copy-bar-btn" id="copyBtn" disabled>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copy context
    </button>
  </div>
  <div class="attach-strip" id="attachStrip">
    <div class="attach-chip">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="attach-chip-name" id="chipName"></span>
      <span class="attach-chip-size" id="chipSize"></span>
      <button class="attach-chip-x" id="attachClear" title="Remove">×</button>
    </div>
  </div>
  <input type="file" id="fileInput" style="display:none"
    accept=".txt,.md,.html,.htm,.css,.js,.jsx,.ts,.tsx,.json,.php,.py,.java,.c,.cpp,.cs,.xml,.yaml,.yml,.sql,.sh,.rb,.go,.rs,.swift,.vue,.svelte,.toml,.env,.gitignore,.csv">
  <div class="input-row">
    <div class="input-wrap" id="inputWrap" data-ai="Claude">
      <button class="attach-btn" id="attachBtn" title="Attach document">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="Post as Claude…"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" data-ai="Claude" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const AIS = ["You","Claude","Gemini","GPT-4o","Grok"];
  const INITIALS = { You:"You", Claude:"Cl", Gemini:"Ge", "GPT-4o":"GP", Grok:"Gr" };
  let activeAI = "Claude";
  let msgCount = 0;
  let pendingFile = null;
  const thread = [];

  function getTime() {
    const d = new Date();
    return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function contextFor(ai) {
    return ai === "You" ? thread : thread.filter(m => m.ai !== ai);
  }

  function updateCopyBar() {
    const label = document.getElementById("copyLabel");
    const btn   = document.getElementById("copyBtn");
    const msgs  = contextFor(activeAI);
    if (!msgs.length) {
      label.textContent = thread.length ? `${activeAI} has nothing to copy` : "No messages yet";
      btn.disabled = true;
    } else {
      const senders = [...new Set(msgs.map(m => m.ai))].join(" + ");
      label.textContent = activeAI === "You"
        ? `Full thread — ${msgs.length} message${msgs.length > 1 ? "s" : ""}`
        : `For ${activeAI}: ${msgs.length} msg${msgs.length > 1 ? "s" : ""} from ${senders}`;
      btn.disabled = false;
    }
  }

  function switchIdentity(ai) {
    activeAI = ai;
    document.querySelectorAll(".id-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.ai === ai)
    );
    document.getElementById("youChip").textContent =
      ai === "You" ? "Posting as yourself" : `You are ${ai}`;
    document.getElementById("chatInput").placeholder =
      ai === "You" ? "Say something…" : `Post as ${ai}…`;
    document.getElementById("inputWrap").dataset.ai = ai;
    document.getElementById("sendBtn").dataset.ai = ai;
    updateCopyBar();
  }

  function fmtBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function fileExt(name) {
    return name.includes('.') ? name.split('.').pop().toLowerCase() : '';
  }

  function renderAttachCard(file) {
    const lines = file.content.split('\n').length;
    const preview = file.content.slice(0, 120).replace(/</g, '&lt;');
    return `<div class="attach-card">
      <div class="attach-card-head">
        <span class="attach-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
        <span class="attach-card-name">${escHtml(file.name)}</span>
        <span class="attach-card-meta">${lines} lines · ${fmtBytes(file.size)}</span>
      </div>
      <div class="attach-card-preview">${preview}${file.content.length > 120 ? '…' : ''}</div>
    </div>`;
  }

  function postMessage(ai, text, file) {
    const e = document.getElementById("emptyState");
    if (e) e.remove();
    msgCount++;
    if (msgCount === 1) {
      const div = document.createElement("div");
      div.className = "day-divider";
      div.innerHTML = `<span>Today</span>`;
      document.getElementById("messages").appendChild(div);
    }
    thread.push({ ai, text, file: file || null });
    const isMe = (ai === "You");
    const msgs = document.getElementById("messages");
    const group = document.createElement("div");
    group.className = `msg-group ${isMe ? "from-me" : ""}`;
    const time = getTime();
    let bubbleContent = text ? escHtml(text) : '';
    if (file) bubbleContent += renderAttachCard(file);
    if (isMe) {
      group.innerHTML = `
        <div class="msg-col">
          <div class="bubble from-me" data-ai="${ai}">${bubbleContent}</div>
          <div class="bubble-time">${time}</div>
        </div>
        <div class="msg-avatar" data-ai="${ai}">You</div>`;
    } else {
      group.innerHTML = `
        <div class="msg-avatar" data-ai="${ai}">${INITIALS[ai]}</div>
        <div class="msg-col">
          <div class="msg-sender" data-ai="${ai}">${ai}</div>
          <div class="bubble from-other">${bubbleContent}</div>
          <div class="bubble-time">${time}</div>
        </div>`;
    }
    msgs.appendChild(group);
    msgs.scrollTop = msgs.scrollHeight;
    updateCopyBar();
  }

  function send() {
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if (!text && !pendingFile) return;
    postMessage(activeAI, text, pendingFile);
    input.value = "";
    input.style.height = "auto";
    clearAttachment();
  }

  function clearAttachment() {
    pendingFile = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('attachStrip').classList.remove('visible');
  }

  function stageFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      pendingFile = { name: file.name, size: file.size, content: e.target.result };
      document.getElementById('chipName').textContent = file.name;
      document.getElementById('chipSize').textContent = fmtBytes(file.size);
      document.getElementById('attachStrip').classList.add('visible');
    };
    reader.readAsText(file);
  }

  document.getElementById("copyBtn").addEventListener("click", () => {
    const msgs = contextFor(activeAI);
    if (!msgs.length) return;
    const compiled = msgs.map(m => {
      let block = `[${m.ai}]`;
      if (m.text) block += `\n${m.text}`;
      if (m.file) block += `\n\n[attachment: ${m.file.name}]\n\`\`\`${fileExt(m.file.name)}\n${m.file.content}\n\`\`\``;
      return block;
    }).join('\n\n---\n\n');
    navigator.clipboard.writeText(compiled).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('done');
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied`;
      setTimeout(() => {
        btn.classList.remove('done');
        btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy context`;
        updateCopyBar();
      }, 2000);
    });
  });

  document.querySelector(".identity-bar").addEventListener("click", e => {
    const btn = e.target.closest(".id-btn");
    if (btn) switchIdentity(btn.dataset.ai);
  });

  document.getElementById("sendBtn").addEventListener("click", send);

  document.getElementById("chatInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  document.getElementById("chatInput").addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
  });

  document.getElementById('attachBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) stageFile(file);
  });

  document.getElementById('attachClear').addEventListener('click', clearAttachment);

  document.getElementById('inputWrap').addEventListener('dragover', e => {
    e.preventDefault();
    e.currentTarget.style.borderColor = 'var(--claude)';
  });

  document.getElementById('inputWrap').addEventListener('dragleave', e => {
    e.currentTarget.style.borderColor = '';
  });

  document.getElementById('inputWrap').addEventListener('drop', e => {
    e.preventDefault();
    e.currentTarget.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file) stageFile(file);
  });

  switchIdentity("Claude");
</script>
</body>
</html>
